<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado - Move Brasil</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .card {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px 24px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="card text-center">
        <div class="mb-6">
            <i class="fas fa-check-circle text-green-500 text-6xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Pagamento confirmado!</h1>
        <p class="text-gray-600 mb-6 leading-relaxed">
            Você tem que esperar 10 dias úteis e entraremos em contato com o resultado da adesão Move Brasil.
        </p>
        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
            <p class="text-blue-800 text-sm">
                <i class="fas fa-info-circle mr-2"></i>
                Fique atento ao seu e-mail e telefone para receber mais informações.
            </p>
        </div>
        <button onclick="window.location.href='index.html'" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition">
            Voltar ao início
        </button>
    </div>
</body>
</html>
